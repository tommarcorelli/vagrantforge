<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="50%" stop-color="#32ADE6"/>
      <stop offset="100%" stop-color="#AF52DE"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="blur1"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#070a10"/>

  <!-- Enclume, tracé simplifié, style néon (contour seul, pas de remplissage plein) -->
  <g fill="none" stroke="url(#brand)" stroke-width="14" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)">
    <path d="M150 210 h60 l14 -34 h64 l14 34 h60 v46 h-38 l-10 30 h-116 l-10 -30 h-38 z"/>
    <rect x="234" y="286" width="44" height="86" rx="6"/>
    <path d="M182 372 h148 l16 44 h-180 z"/>
    <line x1="256" y1="122" x2="256" y2="164"/>
    <line x1="196" y1="140" x2="222" y2="172"/>
    <line x1="316" y1="140" x2="290" y2="172"/>
  </g>

  <!-- Petit éclat façon étincelle -->
  <g fill="url(#brand)" filter="url(#glow)">
    <circle cx="356" cy="178" r="5"/>
    <circle cx="374" cy="200" r="3"/>
    <circle cx="150" cy="188" r="4"/>
  </g>
</svg>
